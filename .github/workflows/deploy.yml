name: Publicar EIGUIT na Web

on:
  push:
    branches: [ main ] # O robô acorda quando a main for atualizada

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v3

      - name: Instalar Python e Pygbag
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Compilar para WebAssembly
        run: |
          python -m pip install --upgrade pip
          pip install pygbag
          pygbag --build .

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true